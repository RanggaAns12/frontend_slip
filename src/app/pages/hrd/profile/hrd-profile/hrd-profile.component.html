<div class="min-h-screen bg-slate-50/50 p-4 sm:p-6 lg:p-10 relative space-y-6 animate-[fadeIn_0.4s_ease-out] pb-20 md:pb-0">
  
  <!-- Header -->
  <div class="bg-white p-5 sm:p-6 rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 relative z-10">
    <div>
      <h1 class="text-2xl font-bold text-slate-800 tracking-tight">Akun Saya</h1>
      <p class="text-sm text-slate-500 mt-1">Kelola informasi profil dan pengaturan keamanan akun Anda.</p>
    </div>
  </div>

  <!-- Loading State -->
  <div *ngIf="isLoading" class="flex justify-center items-center py-20">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500"></div>
  </div>

  <!-- Main Content Grid -->
  <div *ngIf="!isLoading" class="grid grid-cols-1 lg:grid-cols-3 gap-6 relative z-0">
    
    <!-- Bagian Kiri: Info Profil -->
    <div class="lg:col-span-1 space-y-6">
      <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-slate-100 p-8 text-center relative overflow-hidden">
        
        <!-- Efek Background Hiasan -->
        <div class="absolute top-0 left-0 right-0 h-24 bg-gradient-to-r from-orange-100 to-orange-50/50"></div>
        
        <div class="relative z-10 w-28 h-28 mx-auto bg-gradient-to-br from-orange-400 to-orange-600 rounded-full flex items-center justify-center text-white text-4xl font-black shadow-xl shadow-orange-500/20 mb-5 ring-4 ring-white">
          {{ getInitials(profileData.name) }}
        </div>
        
        <h2 class="text-xl font-bold text-slate-800">{{ profileData.name || 'User HRD' }}</h2>
        
        <div class="mt-5 inline-flex items-center px-4 py-1.5 bg-indigo-50 text-indigo-700 text-xs font-bold rounded-full border border-indigo-100 uppercase tracking-wide">
          <svg class="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
          </svg>
          {{ profileData.role }}
        </div>
      </div>
    </div>

    <!-- Bagian Kanan: Form Update -->
    <div class="lg:col-span-2 space-y-6">
      
      <!-- Card Update Profil Dasar -->
      <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-slate-100 overflow-hidden">
        <div class="p-6 border-b border-slate-100 bg-slate-50/30">
          <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
            <svg class="w-5 h-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            Informasi Dasar
          </h3>
          <p class="text-sm text-slate-500 mt-1 ml-7">Perbarui nama akun Anda.</p>
        </div>
        
        <div class="p-6 space-y-5">
          <div class="w-full md:w-1/2">
            <label class="block text-sm font-semibold text-slate-700 mb-2">Nama Lengkap</label>
            <input type="text" [(ngModel)]="profileData.name" placeholder="Masukkan nama Anda"
                   class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 transition-all shadow-sm">
          </div>
        </div>

        <div class="p-5 bg-slate-50/80 border-t border-slate-100 flex justify-end">
          <button (click)="updateProfile()" [disabled]="isSavingProfile"
                  class="px-6 py-2.5 bg-slate-800 hover:bg-slate-700 text-white font-semibold rounded-xl shadow-sm transition-all flex items-center gap-2 disabled:opacity-50">
            <svg *ngIf="isSavingProfile" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            {{ isSavingProfile ? 'Menyimpan...' : 'Simpan Perubahan' }}
          </button>
        </div>
      </div>

      <!-- Card Update Password -->
      <div class="bg-white rounded-2xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-slate-100 overflow-hidden mt-6">
        <div class="p-6 border-b border-slate-100 bg-slate-50/30">
          <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
            <svg class="w-5 h-5 text-rose-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            Keamanan Akun
          </h3>
          <p class="text-sm text-slate-500 mt-1 ml-7">Gunakan kombinasi password yang kuat untuk melindungi akun Anda.</p>
        </div>
        
        <div class="p-6 space-y-5">
          <div class="w-full md:w-1/2">
            <label class="block text-sm font-semibold text-slate-700 mb-2">Password Saat Ini</label>
            <input type="password" [(ngModel)]="passwordData.current_password" placeholder="••••••••"
                   class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition-all shadow-sm">
          </div>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-2 border-t border-slate-100 border-dashed">
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">Password Baru</label>
              <input type="password" [(ngModel)]="passwordData.new_password" placeholder="Minimal 8 karakter"
                     class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition-all shadow-sm">
            </div>
            <div>
              <label class="block text-sm font-semibold text-slate-700 mb-2">Konfirmasi Password Baru</label>
              <input type="password" [(ngModel)]="passwordData.new_password_confirmation" placeholder="Ulangi password baru"
                     class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition-all shadow-sm">
            </div>
          </div>
        </div>

        <div class="p-5 bg-slate-50/80 border-t border-slate-100 flex justify-end">
          <button (click)="updatePassword()" [disabled]="isSavingPassword"
                  class="px-6 py-2.5 bg-rose-600 hover:bg-rose-700 text-white font-bold rounded-xl shadow-lg shadow-rose-500/30 transition-all flex items-center gap-2 disabled:opacity-50">
            <svg *ngIf="isSavingPassword" class="animate-spin h-4 w-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            <svg *ngIf="!isSavingPassword" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
            {{ isSavingPassword ? 'Menyimpan...' : 'Perbarui Password' }}
          </button>
        </div>
      </div>

    </div>
  </div>
</div>
