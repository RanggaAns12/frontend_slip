@if (isOpen) {
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 sm:p-6 bg-gray-900/60 backdrop-blur-sm transition-opacity">
  <div class="bg-gray-50 rounded-2xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col animate-scale-up overflow-hidden">
    
    <div class="px-6 py-5 border-b border-gray-200 bg-white flex justify-between items-center z-10 sticky top-0">
      <div>
        <h2 class="text-xl font-extrabold text-gray-900 tracking-tight">
          {{ isEditMode ? 'Edit Data Karyawan' : 'Input Karyawan Baru' }}
        </h2>
        <p class="text-xs font-medium text-gray-500 mt-1">Lengkapi formulir biodata dan data legalitas.</p>
      </div>
      <button (click)="goBack()" class="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 hover:bg-gray-200 hover:text-gray-700 transition-colors">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
      </button>
    </div>

    <div class="p-6 overflow-y-auto custom-scrollbar">
      <div *ngIf="isLoading" class="p-12 flex justify-center">
        <div class="animate-spin w-8 h-8 border-4 border-orange-200 border-t-orange-600 rounded-full"></div>
      </div>

      <div *ngIf="!isLoading" class="space-y-6">
        
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200 group hover:border-orange-300 transition-colors">
          <div class="flex items-center gap-3 mb-6 border-b border-gray-100 pb-4">
            <div class="w-9 h-9 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            </div>
            <h3 class="text-base font-bold text-gray-800">Identitas Personal</h3>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
            <div class="col-span-1 md:col-span-2">
              <label class="label-text">Nama Lengkap <span class="text-orange-500">*</span></label>
              <input type="text" [(ngModel)]="formData.nama_lengkap" (input)="onNameChange()" class="input-field font-bold text-gray-800" placeholder="Masukkan nama lengkap sesuai KTP...">
            </div>
            <div><label class="label-text">NIK KTP</label><input type="text" [(ngModel)]="formData.nik_ktp" class="input-field font-mono" placeholder="16 Digit NIK"></div>
            <div>
              <label class="label-text">Jenis Kelamin</label>
              <div class="grid grid-cols-2 gap-3">
                <button (click)="formData.jenis_kelamin = 'Laki-laki'" [class]="formData.jenis_kelamin === 'Laki-laki' ? 'bg-orange-50 border-orange-400 text-orange-700 font-bold' : 'bg-gray-50 border-gray-200 text-gray-500'" class="py-2.5 rounded-xl border transition-all text-sm">Laki-laki</button>
                <button (click)="formData.jenis_kelamin = 'Perempuan'" [class]="formData.jenis_kelamin === 'Perempuan' ? 'bg-orange-50 border-orange-400 text-orange-700 font-bold' : 'bg-gray-50 border-gray-200 text-gray-500'" class="py-2.5 rounded-xl border transition-all text-sm">Perempuan</button>
              </div>
            </div>
            <div><label class="label-text">Tempat Lahir</label><input type="text" [(ngModel)]="formData.tempat_lahir" class="input-field"></div>
            <div><label class="label-text">Tanggal Lahir</label><input type="date" [(ngModel)]="formData.tanggal_lahir" class="input-field"></div>
            <div><label class="label-text">Agama</label><select [(ngModel)]="formData.agama" class="input-field cursor-pointer"><option *ngFor="let ag of agamaOptions" [value]="ag">{{ ag }}</option></select></div>
            <div><label class="label-text">Pendidikan</label><select [(ngModel)]="formData.pendidikan" class="input-field cursor-pointer"><option *ngFor="let p of pendidikanOptions" [value]="p">{{ p }}</option></select></div>
            <div class="col-span-1 md:col-span-2"><label class="label-text">Alamat Domisili</label><textarea [(ngModel)]="formData.alamat" rows="2" class="input-field resize-none"></textarea></div>
          </div>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200 group hover:border-blue-300 transition-colors">
          <div class="flex items-center gap-3 mb-6 border-b border-gray-100 pb-4">
            <div class="w-9 h-9 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
            </div>
            <h3 class="text-base font-bold text-gray-800">Data Kepegawaian</h3>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
            <div><label class="label-text text-blue-600">NIK Karyawan <span class="text-red-500">*</span></label><input type="text" [(ngModel)]="formData.nik_karyawan" class="input-field font-mono font-bold text-blue-900 bg-blue-50/50 border-blue-200 focus:border-blue-500 focus:ring-blue-100" placeholder="ADS-..."></div>
            <div><label class="label-text">Status Karyawan</label><select [(ngModel)]="formData.status_karyawan" class="input-field cursor-pointer"><option *ngFor="let st of statusKaryawanOptions" [value]="st">{{ st }}</option></select></div>
            
            <div>
              <label class="label-text">Departemen</label>
              <select [(ngModel)]="formData.dept" (change)="onDeptChange()" class="input-field cursor-pointer">
                <option value="" disabled selected>Pilih Dept</option>
                <option *ngFor="let d of deptOptions" [value]="d">{{ d }}</option>
              </select>
            </div>
            
            <div><label class="label-text">Posisi</label><select [(ngModel)]="formData.posisi" class="input-field cursor-pointer"><option value="" disabled selected>Pilih Posisi</option><option *ngFor="let p of posisiOptions" [value]="p">{{ p }}</option></select></div>
            <div><label class="label-text">Tanggal Bergabung</label><input type="date" [(ngModel)]="formData.tanggal_diterima" class="input-field"></div>
          </div>
        </div>

        <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-200 group hover:border-emerald-300 transition-colors">
          <div class="flex items-center gap-3 mb-6 border-b border-gray-100 pb-4">
            <div class="w-9 h-9 bg-emerald-100 text-emerald-600 rounded-xl flex items-center justify-center">
              <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            </div>
            <h3 class="text-base font-bold text-gray-800">Legalitas & Administrasi Bank</h3>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5">
            <div><label class="label-text">Nama Bank</label><select [(ngModel)]="formData.nama_bank" class="input-field cursor-pointer font-bold text-emerald-800"><option *ngFor="let b of bankOptions" [value]="b">{{ b }}</option></select></div>
            <div><label class="label-text">Nomor Rekening</label><input type="text" [(ngModel)]="formData.no_rekening" class="input-field font-mono font-bold tracking-widest" placeholder="Contoh: 1234567890"></div>
            <div class="md:col-span-2">
              <label class="label-text">Pemilik Rekening</label>
              <input type="text" [(ngModel)]="formData.pemilik_rekening" class="input-field font-semibold text-gray-700 uppercase" placeholder="Nama sesuai buku tabungan">
              <p class="text-[10px] text-gray-400 mt-1 ml-1">*Wajib diisi.</p>
            </div>
            <div><label class="label-text">NPWP</label><input type="text" [(ngModel)]="formData.npwp" class="input-field font-mono" placeholder="XX.XXX.XXX.X-XXX.XXX"></div>
            <div><label class="label-text">Status Pajak</label><select [(ngModel)]="formData.status_pajak" class="input-field cursor-pointer"><option *ngFor="let sp of statusPajakOptions" [value]="sp">{{ sp }}</option></select></div>
            <div class="md:col-span-2"><label class="label-text">BPJS TK</label><input type="text" [(ngModel)]="formData.bpjs_ketenagakerjaan" class="input-field font-mono" placeholder="Nomor KPJ"></div>
          </div>
        </div>

      </div>
    </div>

    <div class="px-6 py-4 border-t border-gray-200 bg-white flex justify-end gap-3 sticky bottom-0 z-10 rounded-b-2xl">
      <button (click)="goBack()" class="px-6 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-xl transition">Batal</button>
      <button (click)="onSubmit()" [disabled]="isSubmitting" class="px-6 py-2.5 bg-gradient-to-r from-orange-500 to-amber-500 hover:from-orange-600 hover:to-amber-600 text-white rounded-xl text-sm font-bold shadow-md shadow-orange-200 transition-all active:scale-95 disabled:opacity-70 flex items-center gap-2">
        <span *ngIf="isSubmitting" class="animate-spin w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span>
        {{ isSubmitting ? 'Menyimpan...' : 'Simpan Data' }}
      </button>
    </div>

  </div>

  <div *ngIf="showErrorModal" class="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-gray-900/60 backdrop-blur-sm animate-fade-in">
    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-sm p-8 text-center animate-pop-in relative overflow-hidden">
      <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-red-400 to-pink-500"></div>
      <div class="w-20 h-20 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner ring-4 ring-red-50">
        <svg class="w-10 h-10" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12" /></svg>
      </div>
      <h3 class="text-xl font-extrabold text-gray-800 mb-2">Gagal Menyimpan</h3>
      <p class="text-red-500 font-medium mb-4">{{ errorMessage }}</p>
      <div *ngIf="errorDetails.length > 0" class="mb-6 text-left bg-red-50 p-4 rounded-xl max-h-40 overflow-y-auto custom-scrollbar">
        <ul class="list-disc pl-4 space-y-1">
          <li *ngFor="let err of errorDetails" class="text-xs text-red-700">{{ err }}</li>
        </ul>
      </div>
      <button (click)="closeErrorModal()" class="w-full py-3.5 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold rounded-xl transition-all">
        Periksa Kembali
      </button>
    </div>
  </div>

</div>
}
