<div class="flex min-h-screen w-full font-sans bg-gray-50">

  <!-- LEFT SIDE: BRANDING -->
  <div class="hidden lg:flex lg:w-1/2 relative bg-gray-900 text-white overflow-hidden">
    <div class="absolute inset-0 bg-cover bg-center opacity-60" style="background-image: url('assets/images/bg-login.jpeg');"></div>
    <div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/50 to-transparent"></div>

    <div class="relative z-10 flex flex-col justify-between w-full p-12 h-full">
      <div class="flex items-center h-12">
        <img src="assets/images/logo.png" alt="Logo" class="h-10 w-auto object-contain" />
        <div class="h-10 w-[2px] bg-[#C87943] mx-4 rounded-full"></div>
        <div>
          <h2 class="text-xl font-bold tracking-wide leading-none mb-1">PT Agro Deli Serdang</h2>
          <p class="text-[10px] font-bold text-[#C87943] tracking-[0.2em] uppercase leading-none">SISTEM PAYROLL</p>
        </div>
      </div>

      <div class="mb-10 pl-2">
        <h1 class="text-5xl font-bold mb-2 drop-shadow-lg">PT. Agro</h1>
        <h1 class="text-5xl font-bold text-[#FF9F68] mb-8 drop-shadow-lg">Deli Serdang</h1>
        <div class="flex items-start gap-5">
          <div class="w-1.5 h-16 bg-[#FF6B2C] rounded-full shadow-lg"></div>
          <p class="text-gray-200 text-sm leading-relaxed max-w-md font-light">
            Sistem Informasi Penggajian Terintegrasi (KBLI 17091).
          </p>
        </div>
      </div>
    </div>
  </div>

  <!-- RIGHT SIDE: FORM -->
  <div class="w-full lg:w-1/2 flex items-center justify-center p-8">
    <div class="w-full max-w-md bg-white p-8 rounded-xl shadow-lg border border-gray-100">

      <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900 mb-2">Selamat Datang</h2>
        <p class="text-gray-500 text-sm">Masuk ke akun untuk kelola data.</p>
      </div>

      <!-- ERROR ALERT -->
      <div *ngIf="errorMessage" class="mb-6 p-4 bg-red-50 border-l-4 border-red-500 text-red-700 rounded-r shadow-sm flex items-start">
        <svg class="h-5 w-5 mr-2 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
        </svg>
        <span class="text-sm font-medium">{{ errorMessage }}</span>
      </div>

      <form (submit)="onLogin()" class="space-y-5">
        
        <!-- Username -->
        <div>
          <label class="block mb-1 text-sm font-semibold text-gray-700">Username / NIP</label>
          <div class="relative">
            <input type="text" name="username" [(ngModel)]="loginData.username" 
                   class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#F4A47B]/50 focus:border-[#F4A47B] transition-all" 
                   placeholder="Masukkan username" required />
            <span class="absolute left-3 top-3.5 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd" />
              </svg>
            </span>
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block mb-1 text-sm font-semibold text-gray-700">Password</label>
          <div class="relative">
            <input [type]="showPassword ? 'text' : 'password'" name="password" [(ngModel)]="loginData.password"
                   class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#F4A47B]/50 focus:border-[#F4A47B] transition-all" 
                   placeholder="Masukkan password" required />
            <span class="absolute left-3 top-3.5 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
              </svg>
            </span>
            <button type="button" (click)="togglePassword()" class="absolute right-3 top-3.5 text-gray-400 hover:text-gray-600 focus:outline-none">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path d="M10 12a2 2 0 100-4 2 2 0 000 4z" />
                <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd" />
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M3.707 2.293a1 1 0 00-1.414 1.414l14 14a1 1 0 001.414-1.414l-1.473-1.473A10.014 10.014 0 0019.542 10C18.268 5.943 14.478 3 10 3a9.958 9.958 0 00-4.512 1.074l-1.78-1.781zm4.261 4.26l1.514 1.515a2.003 2.003 0 012.45 2.45l1.514 1.514a4 4 0 00-5.478-5.478z" clip-rule="evenodd" />
                <path d="M12.454 16.697L9.75 13.992a4 4 0 01-3.742-3.741L2.335 6.578A9.98 9.98 0 00.458 10c1.274 4.057 5.064 7 9.542 7 .847 0 1.669-.105 2.454-.303z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" [disabled]="isLoading" 
                class="w-full bg-[#F4A47B] hover:bg-[#E08E60] text-white font-bold py-3.5 rounded-lg shadow-md hover:shadow-lg transition-all transform hover:-translate-y-0.5 disabled:opacity-50 disabled:cursor-not-allowed flex justify-center items-center gap-2">
          <svg *ngIf="isLoading" class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          {{ isLoading ? 'Memproses...' : 'Masuk Sekarang' }}
        </button>

      </form>

      <div class="mt-8 text-center border-t border-gray-100 pt-6">
        <p class="text-xs text-gray-400">© 2026 PT Agro Deli Serdang. All rights reserved.</p>
      </div>
    </div>
  </div>
</div>
