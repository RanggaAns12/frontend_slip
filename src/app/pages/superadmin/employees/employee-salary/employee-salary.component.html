<div class="min-h-screen bg-gray-50 font-sans pb-20 relative">

  <!-- TOAST -->
  <div *ngIf="toastMessage" 
       [ngClass]="{'bg-green-500': toastType === 'success', 'bg-red-500': toastType === 'error'}"
       class="fixed top-6 right-6 z-50 px-6 py-3 rounded-full shadow-2xl text-white font-medium flex items-center gap-3 animate-fade-in transition-all">
    <span>{{ toastMessage }}</span>
    <button (click)="closeToast()" class="opacity-70 hover:opacity-100">&times;</button>
  </div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-8">
    
    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-center gap-6 mb-8">
      <div class="flex items-center gap-4">
        <button (click)="goBack()" class="w-10 h-10 rounded-full bg-white border border-gray-200 flex items-center justify-center text-gray-500 hover:text-orange-600 hover:border-orange-200 transition-all shadow-sm">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
        </button>
        <div>
            <h1 class="text-2xl font-extrabold text-gray-900 tracking-tight">Penyesuaian Gaji</h1>
            <p class="text-emerald-600 font-medium text-sm mt-1">Kelola gaji pokok karyawan (Salary Adjustment)</p>
        </div>
      </div>
      
      <!-- SEARCH -->
      <div class="w-full md:w-80 relative">
        <svg class="absolute left-4 top-3.5 w-5 h-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        <input type="text" [(ngModel)]="searchKeyword" (ngModelChange)="onSearch($event)" placeholder="Cari nama karyawan..." class="w-full pl-12 pr-4 py-3 bg-white border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-200 focus:border-emerald-400 transition-all outline-none font-medium shadow-sm">
      </div>
    </div>

    <!-- TABLE CARD -->
    <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden flex flex-col min-h-[500px] animate-fade-in">
      
      <!-- LOADING -->
      <div *ngIf="isLoading" class="flex-1 flex flex-col items-center justify-center p-12">
        <div class="w-12 h-12 border-4 border-emerald-100 border-t-emerald-500 rounded-full animate-spin mb-4"></div>
        <p class="text-gray-400 font-medium">Memuat data gaji...</p>
      </div>

      <!-- TABLE CONTENT -->
      <div *ngIf="!isLoading" class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-emerald-50/50 border-b border-emerald-100">
              <th class="py-5 px-6 text-xs font-bold text-emerald-600 uppercase tracking-wider w-1/3">Karyawan</th>
              <th class="py-5 px-6 text-xs font-bold text-emerald-600 uppercase tracking-wider hidden md:table-cell">Jabatan</th>
              <th class="py-5 px-6 text-xs font-bold text-emerald-600 uppercase tracking-wider text-right w-1/3">Gaji Pokok (Rp)</th>
              <th class="py-5 px-6 text-xs font-bold text-emerald-600 uppercase tracking-wider text-center w-20">Aksi</th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-50">
            <tr *ngFor="let emp of filteredEmployees" class="hover:bg-gray-50 transition group">
              
              <!-- INFO KARYAWAN -->
              <td class="py-4 px-6">
                <div class="flex items-center gap-4">
                  <div class="w-10 h-10 rounded-full bg-emerald-100 text-emerald-600 flex items-center justify-center font-bold text-sm">
                    {{ emp.nama_lengkap.charAt(0) }}
                  </div>
                  <div>
                    <div class="font-bold text-gray-800">{{ emp.nama_lengkap }}</div>
                    <div class="text-xs text-gray-400 font-mono">{{ emp.nik_karyawan }}</div>
                  </div>
                </div>
              </td>

              <!-- JABATAN -->
              <td class="py-4 px-6 hidden md:table-cell">
                <div class="text-sm text-gray-600 font-medium">{{ emp.posisi || '-' }}</div>
                <div class="text-xs text-gray-400">{{ emp.dept || '-' }}</div>
              </td>

              <!-- INPUT GAJI (EDITABLE) -->
              <td class="py-4 px-6">
                <div class="relative max-w-[200px] ml-auto">
                    <span class="absolute left-3 top-2.5 text-emerald-600 font-bold text-sm">Rp</span>
                    <input type="number" 
                           [(ngModel)]="emp.gaji_pokok" 
                           (keyup.enter)="saveSalary(emp)"
                           class="salary-input pl-8">
                </div>
              </td>

              <!-- TOMBOL SIMPAN -->
              <td class="py-4 px-6 text-center">
                <button (click)="saveSalary(emp)" 
                        [disabled]="emp.gaji_pokok === emp.original_gaji || isProcessing === emp.id"
                        [class]="emp.gaji_pokok !== emp.original_gaji ? 'bg-emerald-500 text-white shadow-emerald-200 hover:bg-emerald-600 shadow-lg' : 'bg-gray-100 text-gray-300 cursor-not-allowed'"
                        class="w-10 h-10 rounded-xl flex items-center justify-center transition-all duration-300">
                  
                  <!-- Icon Loading -->
                  <svg *ngIf="isProcessing === emp.id" class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                  
                  <!-- Icon Check (Save) -->
                  <svg *ngIf="isProcessing !== emp.id" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                </button>
              </td>

            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
