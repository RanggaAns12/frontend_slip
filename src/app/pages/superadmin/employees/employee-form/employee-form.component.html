<div class="p-4 md:p-6 bg-gray-50 min-h-screen font-sans pb-24 animate-fade-in-up">
  
  <div class="mb-6 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl md:text-3xl font-extrabold text-gray-900 tracking-tight">
        {{ isEditMode ? 'Edit Data Karyawan' : 'Tambah Karyawan Baru' }}
      </h1>
      <p class="text-sm text-gray-500 mt-1.5 font-medium">Lengkapi formulir master data karyawan PT Agro Deli Serdang.</p>
    </div>
    
    <button type="button" (click)="goBack()" class="flex items-center gap-2 px-4 py-2 bg-white border border-gray-200 text-gray-700 text-sm font-bold rounded-xl hover:bg-gray-100 transition-all shadow-sm">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
      <span>Kembali</span>
    </button>
  </div>

  <div *ngIf="isLoading" class="bg-white p-12 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-3">
    <svg class="animate-spin h-8 w-8 text-[#F4A47B]" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
    <span class="text-gray-400 font-medium">Memuat data karyawan...</span>
  </div>

  <form *ngIf="!isLoading" [formGroup]="employeeForm" (ngSubmit)="onSubmit()" class="space-y-6">
    
    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
      
      <div class="xl:col-span-1 space-y-6">
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 md:p-6">
          <h2 class="text-lg font-bold text-gray-800 mb-4 border-b border-gray-50 pb-3 flex items-center gap-2">
            <svg class="w-5 h-5 text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
            Data Pekerjaan
          </h2>
          
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">NIK Karyawan <span class="text-red-500">*</span></label>
              <input type="text" formControlName="nik_karyawan" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-200 text-sm">
              <p *ngIf="employeeForm.get('nik_karyawan')?.invalid && employeeForm.get('nik_karyawan')?.touched" class="text-xs text-red-500 mt-1">NIK wajib diisi</p>
            </div>

            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Nama Lengkap <span class="text-red-500">*</span></label>
              <input type="text" formControlName="nama_lengkap" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-200 text-sm">
            </div>

            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Departemen <span class="text-red-500">*</span></label>
              <select formControlName="dept" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-200 text-sm cursor-pointer">
                <option value="" disabled>-- Pilih Departemen --</option>
                <option *ngFor="let d of departments" [value]="d">{{ d }}</option>
              </select>
            </div>

            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Posisi / Jabatan <span class="text-red-500">*</span></label>
              <select formControlName="posisi" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-200 text-sm cursor-pointer" [attr.disabled]="!employeeForm.get('dept')?.value ? true : null">
                <option value="" disabled>-- Pilih Posisi --</option>
                <option *ngFor="let p of positions" [value]="p">{{ p }}</option>
              </select>
              <p *ngIf="!employeeForm.get('dept')?.value" class="text-[10px] text-orange-500 mt-1">*Pilih departemen terlebih dahulu</p>
            </div>

            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Status Karyawan</label>
              <select formControlName="status_karyawan" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-200 text-sm">
                <option value="PKWTT">PKWTT (Tetap)</option>
                <option value="PKWT">PKWT (Kontrak)</option>
                <option value="Harian">Harian Lepas</option>
                <option value="Borongan">Borongan</option>
              </select>
            </div>

            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tanggal Diterima</label>
              <input type="date" formControlName="tanggal_diterima" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-orange-200 text-sm">
            </div>
            
            <div class="pt-2">
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" formControlName="is_active" [value]="1" class="w-4 h-4 text-orange-500 border-gray-300 rounded focus:ring-orange-400">
                <span class="text-sm font-bold text-gray-700">Karyawan Aktif Bekerja</span>
              </label>
            </div>
          </div>
        </div>
      </div>

      <div class="xl:col-span-2 space-y-6">
        
        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 md:p-6">
          <h2 class="text-lg font-bold text-gray-800 mb-4 border-b border-gray-50 pb-3 flex items-center gap-2">
            <svg class="w-5 h-5 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
            Identitas Pribadi
          </h2>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">NIK KTP</label>
              <input type="text" formControlName="nik_ktp" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-200 text-sm">
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tanggal Lahir</label>
              <input type="date" formControlName="tanggal_lahir" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-200 text-sm">
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Jenis Kelamin</label>
              <select formControlName="jenis_kelamin" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-200 text-sm">
                <option value="">-- Pilih --</option>
                <option value="Laki-laki">Laki-laki</option>
                <option value="Perempuan">Perempuan</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Agama</label>
              <select formControlName="agama" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-200 text-sm">
                <option value="">-- Pilih --</option>
                <option value="Islam">Islam</option>
                <option value="Kristen">Kristen</option>
                <option value="Katolik">Katolik</option>
                <option value="Hindu">Hindu</option>
                <option value="Buddha">Buddha</option>
                <option value="Konghucu">Konghucu</option>
              </select>
            </div>
            <div class="md:col-span-2">
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Pendidikan Terakhir</label>
              <input type="text" formControlName="pendidikan" placeholder="Contoh: S1 Teknik Mesin / SMA Sederajat" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-200 text-sm">
            </div>
            <div class="md:col-span-2">
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Alamat Lengkap</label>
              <textarea formControlName="alamat" rows="2" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-blue-200 text-sm resize-none"></textarea>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5 md:p-6">
          <h2 class="text-lg font-bold text-gray-800 mb-4 border-b border-gray-50 pb-3 flex items-center gap-2">
            <svg class="w-5 h-5 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
            Data Payroll & Legal
          </h2>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">No. Rekening</label>
              <input type="text" formControlName="no_rekening" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-emerald-200 text-sm">
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Status PTKP (Pajak)</label>
              <select formControlName="status_pajak" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-emerald-200 text-sm">
                <option value="TK/0">TK/0 (Tidak Kawin / Tanpa Tanggungan)</option>
                <option value="K/0">K/0 (Kawin / Tanpa Tanggungan)</option>
                <option value="K/1">K/1 (Kawin / 1 Tanggungan)</option>
                <option value="K/2">K/2 (Kawin / 2 Tanggungan)</option>
                <option value="K/3">K/3 (Kawin / 3 Tanggungan)</option>
              </select>
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">BPJS Ketenagakerjaan</label>
              <input type="text" formControlName="bpjs_ketenagakerjaan" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-emerald-200 text-sm">
            </div>
            <div>
              <label class="block text-xs font-bold text-gray-500 uppercase mb-1">NPWP</label>
              <input type="text" formControlName="npwp" class="w-full py-2 px-3 bg-gray-50 border border-gray-200 rounded-lg outline-none focus:ring-2 focus:ring-emerald-200 text-sm">
            </div>
          </div>
        </div>

      </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 lg:left-64 bg-white border-t border-gray-200 p-4 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.05)] flex justify-end gap-3 z-40">
      <button type="button" (click)="goBack()" class="px-6 py-2.5 text-sm font-bold text-gray-600 bg-gray-100 rounded-xl hover:bg-gray-200 transition-colors">
        Batal
      </button>
      <button type="submit" [disabled]="isSubmitting" class="flex items-center gap-2 px-8 py-2.5 text-sm font-bold text-white bg-gradient-to-r from-orange-500 to-amber-500 rounded-xl hover:shadow-lg hover:shadow-orange-500/30 transition-all disabled:opacity-70">
        <svg *ngIf="isSubmitting" class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <span>{{ isSubmitting ? 'Menyimpan...' : 'Simpan Data Karyawan' }}</span>
      </button>
    </div>

  </form>
</div>
