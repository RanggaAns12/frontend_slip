<header class="h-16 bg-white border-b border-gray-100 flex items-center justify-between px-4 lg:px-6 shadow-sm z-30 relative shrink-0">
  
  <!-- LEFT: TOGGLE & TITLE -->
  <div class="flex items-center gap-4">
    
    <!-- Mobile Toggle -->
    <button (click)="layoutService.toggleMobileSidebar()" class="lg:hidden p-2 text-gray-500 hover:bg-gray-100 rounded-lg transition-colors">
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>

    <!-- Desktop Toggle -->
    <button (click)="layoutService.toggleSidebar()" class="hidden lg:block p-2 text-gray-400 hover:text-orange-500 hover:bg-orange-50 rounded-lg transition-colors" title="Toggle Sidebar">
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" />
      </svg>
    </button>

    <!-- Page Title / Breadcrumb (Opsional) -->
    <div class="hidden sm:block">
      <h2 class="text-lg font-bold text-gray-800 tracking-tight">Dashboard</h2>
    </div>
  </div>

  <!-- RIGHT: USER INFO & ACTIONS -->
  <div class="flex items-center gap-4">
    
    <!-- Greeting & Time -->
    <div class="text-right leading-tight hidden md:block">
      <p class="text-sm font-semibold text-gray-700">
        {{ greeting }}, <span class="text-orange-600 font-bold">{{ userName }}</span>
      </p>
      <p class="text-[11px] text-gray-400 font-medium mt-0.5">
        {{ currentTime | date:'EEEE, d MMM yyyy • HH:mm' }}
      </p>
    </div>

    <!-- Notification Bell -->
    <button class="relative p-2 text-gray-400 hover:text-orange-500 hover:bg-orange-50 rounded-full transition-colors">
      <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
      <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
      </svg>
    </button>

    <!-- Avatar Profile -->
    <div class="w-9 h-9 rounded-full bg-gradient-to-br from-orange-100 to-orange-200 text-orange-700 border border-white shadow-sm flex items-center justify-center font-bold text-sm cursor-pointer hover:ring-2 hover:ring-orange-200 transition-all">
      {{ userInitials }}
    </div>

  </div>
</header>
