<!-- SIDEBAR WRAPPER -->
<aside 
  class="inset-y-0 left-0 z-40 bg-white flex flex-col transition-all duration-300 ease-in-out shadow-xl lg:shadow-none h-full fixed lg:static border-r border-gray-100"
  [ngClass]="{
    'w-64': !layoutService.isSidebarCollapsed(), 
    'w-20': layoutService.isSidebarCollapsed(),
    '-translate-x-full': !layoutService.isMobileSidebarOpen(),
    'translate-x-0': layoutService.isMobileSidebarOpen(),
    'lg:translate-x-0': true
  }"
>
  
  <!-- LOGO AREA (FIXED HEIGHT) -->
  <div class="h-16 flex items-center justify-center border-b border-gray-50 relative shrink-0">
    <!-- Full Logo (Saat Sidebar Lebar) -->
    <div class="flex items-center gap-3 transition-opacity duration-300 w-full px-6"
         [class.opacity-0]="layoutService.isSidebarCollapsed()"
         [class.hidden]="layoutService.isSidebarCollapsed()">
      <img src="assets/images/logo.png" alt="Logo" class="h-8 w-auto object-contain"> 
      <div class="flex flex-col justify-center leading-none">
        <span class="font-extrabold text-gray-800 text-sm">PT. Agro Deli</span>
        <span class="text-[10px] font-bold text-orange-500 tracking-wider uppercase mt-0.5">SERDANG</span>
      </div>
    </div>

    <!-- Icon Only (Saat Sidebar Kecil) -->
    <img src="assets/images/logo.png" alt="Logo" 
         class="h-8 w-auto transition-all duration-300 absolute left-1/2 transform -translate-x-1/2"
         [class.opacity-0]="!layoutService.isSidebarCollapsed()"
         [class.scale-0]="!layoutService.isSidebarCollapsed()">
  </div>

  <!-- MENU LIST (SCROLLABLE) -->
  <nav class="flex-1 overflow-y-auto overflow-x-hidden py-4 px-3 space-y-1 custom-scrollbar" style="overscroll-behavior: contain;">
    
    <!-- DASHBOARD -->
    <div class="mb-2">
      <a routerLink="/superadmin/dashboard" routerLinkActive="bg-orange-50 text-orange-600" 
         class="flex items-center p-3 rounded-xl text-gray-500 hover:bg-gray-50 hover:text-gray-900 group transition-all duration-200 relative cursor-pointer"
         title="Dashboard">
        <svg class="flex-shrink-0 w-6 h-6 transition-colors duration-200 group-hover:text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
        </svg>
        <span class="ml-3 font-semibold whitespace-nowrap transition-all duration-300" [class.hidden]="layoutService.isSidebarCollapsed()">
          Dashboard
        </span>
      </a>
    </div>

    <!-- GROUP: MASTER DATA -->
    <div class="mb-6 space-y-1">
      <p class="px-4 text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2 mt-4 transition-opacity duration-300" [class.opacity-0]="layoutService.isSidebarCollapsed()">
        MASTER DATA
      </p>
      
      <!-- DATA KARYAWAN -->
      <a routerLink="/superadmin/employees" routerLinkActive="bg-orange-50 text-orange-600" 
         class="flex items-center p-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 group transition-all duration-200 relative cursor-pointer"
         title="Data Karyawan">
        <svg class="flex-shrink-0 w-6 h-6 transition-colors duration-200 group-hover:text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
        </svg>
        <span class="ml-3 font-medium whitespace-nowrap transition-all duration-300" [class.hidden]="layoutService.isSidebarCollapsed()">
          Data Karyawan
        </span>
      </a>

      <!-- DATA USERS -->
      <a routerLink="/superadmin/users" routerLinkActive="bg-orange-50 text-orange-600" 
         class="flex items-center p-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 group transition-all duration-200 relative cursor-pointer"
         title="Kelola Users">
        <svg class="flex-shrink-0 w-6 h-6 transition-colors duration-200 group-hover:text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        <span class="ml-3 font-medium whitespace-nowrap transition-all duration-300" [class.hidden]="layoutService.isSidebarCollapsed()">
          Admin Users
        </span>
      </a>
    </div>

    <!-- GROUP: KEHADIRAN -->
    <div class="mb-6 space-y-1">
      <p class="px-4 text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2 mt-4 transition-opacity duration-300" [class.opacity-0]="layoutService.isSidebarCollapsed()">
        KEHADIRAN
      </p>
      
      <!-- DATA ABSENSI -->
      <a routerLink="/superadmin/attendance-summaries" routerLinkActive="bg-orange-50 text-orange-600" 
         class="flex items-center p-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 group transition-all duration-200 relative cursor-pointer"
         title="Data Absensi">
        <svg class="flex-shrink-0 w-6 h-6 transition-colors duration-200 group-hover:text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
        <span class="ml-3 font-medium whitespace-nowrap transition-all duration-300" [class.hidden]="layoutService.isSidebarCollapsed()">
          Data Absensi
        </span>
      </a>

      <!-- DATA LEMBUR -->
      <a routerLink="/superadmin/overtimes" routerLinkActive="bg-orange-50 text-orange-600" 
         class="flex items-center p-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 group transition-all duration-200 relative cursor-pointer"
         title="Data Lembur">
        <svg class="flex-shrink-0 w-6 h-6 transition-colors duration-200 group-hover:text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="ml-3 font-medium whitespace-nowrap transition-all duration-300" [class.hidden]="layoutService.isSidebarCollapsed()">
          Data Lembur
        </span>
      </a>
    </div>

    <!-- GROUP: PENGGAJIAN (Modul Baru) -->
    <div class="mb-6 space-y-1">
      <p class="px-4 text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2 mt-4 transition-opacity duration-300" [class.opacity-0]="layoutService.isSidebarCollapsed()">
        PENGGAJIAN
      </p>

      <!-- GENERATE GAJI -->
      <a routerLink="/superadmin/payroll/generate" routerLinkActive="bg-orange-50 text-orange-600" 
         class="flex items-center p-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 group transition-all duration-200 relative cursor-pointer"
         title="Generate Gaji">
        <svg class="flex-shrink-0 w-6 h-6 transition-colors duration-200 group-hover:text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
           <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z" />
        </svg>
        <span class="ml-3 font-medium whitespace-nowrap transition-all duration-300" [class.hidden]="layoutService.isSidebarCollapsed()">
          Generate Gaji
        </span>
      </a>

      <!-- SLIP GAJI -->
      <a routerLink="/superadmin/payroll/slips" routerLinkActive="bg-orange-50 text-orange-600" 
         class="flex items-center p-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 group transition-all duration-200 relative cursor-pointer"
         title="Slip Gaji">
         <svg class="flex-shrink-0 w-6 h-6 transition-colors duration-200 group-hover:text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <span class="ml-3 font-medium whitespace-nowrap transition-all duration-300" [class.hidden]="layoutService.isSidebarCollapsed()">
          Slip Gaji
        </span>
      </a>
    </div>

    <!-- GROUP: SETTINGS -->
    <div class="mb-6 space-y-1">
      <p class="px-4 text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-2 mt-4 transition-opacity duration-300" [class.opacity-0]="layoutService.isSidebarCollapsed()">
        PENGATURAN
      </p>

      <!-- KOMPONEN GAJI -->
      <a routerLink="/superadmin/settings/salary-components" routerLinkActive="bg-orange-50 text-orange-600" 
         class="flex items-center p-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 group transition-all duration-200 relative cursor-pointer"
         title="Master Komponen Gaji">
         <svg class="flex-shrink-0 w-6 h-6 transition-colors duration-200 group-hover:text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
        </svg>
        <span class="ml-3 font-medium whitespace-nowrap transition-all duration-300" [class.hidden]="layoutService.isSidebarCollapsed()">
          Komponen Gaji
        </span>
      </a>

       <!-- SETTING USER / AKUN SAYA (Baru Diganti) -->
       <a routerLink="/superadmin/settings/profile" routerLinkActive="bg-orange-50 text-orange-600" 
         class="flex items-center p-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 group transition-all duration-200 relative cursor-pointer"
         title="Pengaturan Akun">
         <svg class="flex-shrink-0 w-6 h-6 transition-colors duration-200 group-hover:text-orange-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
        <span class="ml-3 font-medium whitespace-nowrap transition-all duration-300" [class.hidden]="layoutService.isSidebarCollapsed()">
          Akun Saya
        </span>
      </a>
    </div>

  </nav>

  <!-- BOTTOM: PROFILE & LOGOUT -->
  <div class="p-4 mb-2 shrink-0 border-t border-gray-100 bg-gray-50/50">
    <div class="flex items-center p-2 rounded-xl transition-all duration-300 hover:bg-white hover:shadow-sm border border-transparent hover:border-gray-100 cursor-pointer"
         [class.justify-center]="layoutService.isSidebarCollapsed()"
         title="Klik untuk melihat profile">
      
      <!-- Avatar Initials -->
      <div class="h-9 w-9 rounded-lg bg-orange-100 text-orange-600 flex items-center justify-center font-bold text-sm shadow-sm shrink-0">
        {{ userInitials }}
      </div>

      <!-- User Info (Dinamis dari TypeScript) -->
      <div class="ml-3 flex-1 min-w-0 transition-all duration-300" [class.hidden]="layoutService.isSidebarCollapsed()">
        <p class="text-sm font-bold text-gray-800 truncate">{{ userName }}</p>
        <p class="text-[10px] text-gray-500 font-medium truncate uppercase">{{ userRole }}</p>
      </div>

      <!-- Logout Button -->
      <button (click)="logout()" 
              class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-lg transition-colors ml-auto"
              [class.hidden]="layoutService.isSidebarCollapsed()"
              title="Keluar Aplikasi">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
      </button>
    </div>
  </div>
</aside>
