<div class="flex h-screen bg-gray-50 font-sans overflow-hidden">

  <!-- SIDEBAR (Fixed Left) -->
  <app-sidebar class="flex-shrink-0 z-40"></app-sidebar>

  <!-- MOBILE BACKDROP -->
  <div *ngIf="layoutService.isMobileSidebarOpen()"
       (click)="layoutService.closeMobileSidebar()"
       class="fixed inset-0 bg-black/30 z-30 lg:hidden transition-opacity backdrop-blur-sm">
  </div>

  <!-- MAIN WRAPPER -->
  <div class="flex-1 flex flex-col min-w-0 h-full relative transition-all duration-300">

    <!-- NAVBAR (Fixed Top) -->
    <app-navbar></app-navbar>

    <!-- CONTENT AREA (Scrollable) -->
    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-[#F9FAFB] p-4 lg:p-8 relative">
      
      <!-- PERBAIKAN: Gunakan router-outlet -->
      <!-- Di sinilah Angular akan merender DashboardComponent, EmployeesComponent, dll -->
      <router-outlet></router-outlet>

    </main>

  </div>
</div>
